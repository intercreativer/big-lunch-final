<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Биг Ланч — Запусти наполнение вкусом</title>

  <link rel="icon" type="image/png" href="img/assets/logo_color.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="#" aria-label="Биг Ланч — на главную">
        <img class="brand__logo" src="img/assets/logo_color.png" alt="Биг Ланч" />
      </a>

      <nav class="main-nav" id="main-nav">
        <a class="main-nav__link" href="#products">Продукты</a>
        <a class="main-nav__link" href="#feedback">Обратная связь</a>
        <a class="tab-flavor is-active main-nav__cta" href="#quiz">Запустить наполнение вкусом</a>
      </nav>

      <img class="fill-meter" src="img/assets/empty_battery.png" alt="Наполнение вкусом" />

      <button class="nav-toggle" type="button" aria-label="Открыть меню"
              aria-controls="main-nav" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="hero" id="quiz">
    <section class="frame" aria-label="Выбери героя">
      <div class="heroes">
        <div class="hero-panel hero-panel--guy">
          <img class="hero-panel__img" src="img/game/guy/guy.svg" alt="Пётр" />
        </div>
        <div class="hero-panel hero-panel--gal">
          <img class="hero-panel__img" src="img/game/gal/gal.svg" alt="Оксана" />
        </div>
      </div>

      <!-- "Выбери героя" tab (desktop + mobile variants) -->
      <img class="pick-hero pick-hero--desktop" src="img/assets/pick_hero.png" alt="Выбери героя" />
      <img class="pick-hero pick-hero--mobile" src="img/assets/pick_hero_mobile.png" alt="Выбери героя" />

      <!-- desktop: a button on each panel -->
      <a class="hero-btn hero-btn--petr" href="#"><img src="img/assets/button_petr.png" alt="Пётр" /></a>
      <a class="hero-btn hero-btn--oksana" href="#"><img src="img/assets/button_oksana.png" alt="Оксана" /></a>
    </section>

    <!-- mobile: both buttons in one bottom bar -->
    <div class="hero-actions"><img src="img/assets/oksana_petr_mobile.png" alt="Оксана / Пётр" /></div>
  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
